<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Premium Vault Calculator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #0b0b0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      margin: 0;
    }
    .phone {
      max-width: 420px;
      width: 100%;
      background: radial-gradient(circle at 20% 30%, #15151e, #07080c);
      border-radius: 48px;
      padding: 16px 14px 20px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.9), 0 0 0 1px rgba(90, 200, 255, 0.08);
      position: relative;
      backdrop-filter: blur(2px);
      transition: all 0.2s;
      border: 1px solid rgba(60, 180, 255, 0.12);
    }
    /* PIN SETUP */
    #pinSetup {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 600px;
      padding: 20px 10px;
    }
    #pinSetup h2 {
      color: #d0e6ff;
      font-weight: 400;
      letter-spacing: 2px;
      font-size: 1.6rem;
      margin-bottom: 30px;
      text-shadow: 0 0 12px rgba(0, 180, 255, 0.4);
      background: linear-gradient(135deg, #a0d0ff, #b07aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .pin-display {
      background: rgba(10, 20, 30, 0.6);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 12px 28px;
      font-size: 2.8rem;
      letter-spacing: 16px;
      color: #b6e4ff;
      text-shadow: 0 0 20px #3a9eff;
      border: 1px solid rgba(70, 180, 255, 0.25);
      margin-bottom: 40px;
      width: 220px;
      text-align: center;
      font-weight: 300;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.6);
    }
    .pin-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      width: 260px;
      margin-bottom: 30px;
    }
    .pin-pad button {
      aspect-ratio: 1/1;
      border-radius: 60px;
      border: none;
      background: rgba(40, 50, 70, 0.5);
      backdrop-filter: blur(4px);
      color: #ecf9ff;
      font-size: 1.9rem;
      font-weight: 300;
      box-shadow: 0 6px 12px rgba(0,0,0,0.6), 0 0 0 1px rgba(100, 200, 255, 0.1);
      transition: all 0.08s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #1f2937, #0f141f);
      color: #cfecff;
      text-shadow: 0 0 6px #2070b0;
    }
    .pin-pad button:active {
      transform: scale(0.92);
      background: #1f2b3a;
      box-shadow: 0 0 20px #1f8aff;
    }
    .pin-pad button.confirm-pin {
      background: linear-gradient(145deg, #3b6bff, #7a3aff);
      color: white;
      font-size: 1.6rem;
      box-shadow: 0 0 30px #3f6eff88;
    }
    .pin-pad button.confirm-pin:active {
      transform: scale(0.88);
      background: #2f5aff;
    }

    /* CALCULATOR */
    #calculator {
      display: flex;
      flex-direction: column;
      min-height: 620px;
      padding: 10px 4px;
    }
    .calc-display {
      background: transparent;
      padding: 20px 12px 8px;
      text-align: right;
      font-size: 3.8rem;
      font-weight: 300;
      color: #eaf4ff;
      letter-spacing: 1px;
      min-height: 130px;
      border-bottom: 1px solid rgba(70, 160, 255, 0.15);
      margin-bottom: 20px;
      word-break: break-all;
      text-shadow: 0 0 25px #006eff33;
    }
    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    .calc-grid button {
      aspect-ratio: 1/1;
      border: none;
      border-radius: 60px;
      background: #1c2330;
      color: #d6ecff;
      font-size: 1.9rem;
      font-weight: 400;
      box-shadow: 0 8px 14px rgba(0,0,0,0.7), 0 0 0 1px #26405a;
      transition: all 0.06s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 30% 30%, #26313f, #131a24);
      color: #eaf4ff;
    }
    .calc-grid button:active {
      transform: scale(0.90);
      box-shadow: 0 0 25px #3f8eff;
    }
    .calc-grid .op {
      background: radial-gradient(circle at 30% 30%, #1c5a8a, #0b2848);
      color: #9ed3ff;
      text-shadow: 0 0 10px #0080ff;
    }
    .calc-grid .eq {
      background: radial-gradient(circle at 30% 30%, #6f4aff, #3a1f9e);
      color: white;
      box-shadow: 0 0 40px #6040ff77;
      font-size: 2.4rem;
    }
    .calc-grid .eq:active {
      transform: scale(0.86);
      background: #5a3aff;
    }
    .calc-grid .clear {
      background: radial-gradient(circle at 30% 30%, #8f2a2a, #4f1212);
      color: #ff9f9f;
    }
    .calc-grid .clear:active {
      background: #b33a3a;
    }

    /* VAULT UNLOCK */
    #vaultUnlock {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 30px 0;
    }
    .vault-pin-box {
      background: rgba(0, 20, 40, 0.5);
      backdrop-filter: blur(16px);
      border-radius: 70px;
      padding: 18px 36px;
      font-size: 2.8rem;
      letter-spacing: 18px;
      color: #b0e0ff;
      border: 1px solid #3f8eff55;
      width: 230px;
      text-align: center;
      margin-bottom: 30px;
      box-shadow: 0 0 40px #1f6eff33;
    }
    .vault-pin-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      width: 250px;
    }
    .vault-pin-pad button {
      aspect-ratio: 1/1;
      border-radius: 60px;
      border: none;
      background: #1b2636;
      color: #d6f0ff;
      font-size: 2rem;
      box-shadow: 0 6px 10px #00000077;
      transition: 0.07s;
      cursor: pointer;
    }
    .vault-pin-pad button:active {
      transform: scale(0.88);
      box-shadow: 0 0 30px #3d8eff;
    }

    /* VAULT HOME */
    #vaultHome {
      display: none;
      flex-direction: column;
      padding: 6px 0 12px;
    }
    .vault-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
      background: rgba(0,0,0,0.2);
      border-radius: 60px;
      padding: 24px 10px 18px;
      backdrop-filter: blur(6px);
      border: 1px solid #3f8eff33;
      position: relative;
    }
    .vault-header .back-btn {
      position: absolute;
      left: 12px;
      top: 12px;
      background: rgba(30, 60, 120, 0.35);
      border: 1px solid #3f7fcf44;
      color: #b0d0ff;
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.1s;
      display: flex;
      align-items: center;
      gap: 4px;
      letter-spacing: 0.3px;
    }
    .vault-header .back-btn i {
      font-size: 0.7rem;
      margin: 0;
      text-shadow: none;
      color: #b0d0ff;
    }
    .vault-header .back-btn:active {
      transform: scale(0.90);
      background: rgba(30, 60, 120, 0.6);
    }
    .vault-header i {
      font-size: 3.6rem;
      color: #80bfff;
      text-shadow: 0 0 40px #3f8eff;
      margin-bottom: 6px;
    }
    .vault-header h3 {
      font-size: 2rem;
      font-weight: 400;
      background: linear-gradient(135deg, #b0d6ff, #b484ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    .vault-header span {
      color: #859bb5;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }

    .vault-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin: 10px 0 18px;
    }
    .vault-card {
      background: rgba(30, 45, 70, 0.3);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 18px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid rgba(80, 180, 255, 0.15);
      box-shadow: 0 12px 24px rgba(0,0,0,0.6);
      transition: 0.15s;
      cursor: pointer;
      color: #cedfff;
    }
    .vault-card:active {
      transform: scale(0.94);
      box-shadow: 0 0 40px #2f7eff55;
    }
    .vault-card i {
      font-size: 2.4rem;
      margin-bottom: 6px;
      color: #90caff;
    }
    .vault-card span {
      font-size: 0.75rem;
      letter-spacing: 0.5px;
      opacity: 0.9;
    }

    /* bottom nav */
    .bottom-nav {
      display: none;
      background: rgba(16, 24, 40, 0.7);
      backdrop-filter: blur(30px);
      border-radius: 60px;
      padding: 10px 6px;
      margin-top: 16px;
      border: 1px solid #3a6a9a55;
      justify-content: space-around;
      box-shadow: 0 -6px 30px #00000077;
    }
    .bottom-nav button {
      background: transparent;
      border: none;
      color: #7b99bb;
      font-size: 1.4rem;
      padding: 8px 10px;
      border-radius: 40px;
      transition: 0.1s;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }
    .bottom-nav button.active {
      color: #90d0ff;
      text-shadow: 0 0 20px #3f8eff;
      background: rgba(60, 150, 255, 0.1);
    }
    .bottom-nav button:active {
      transform: scale(0.88);
    }

    /* sections */
    .vault-section {
      display: none;
      flex-direction: column;
      padding: 8px 2px;
      min-height: 400px;
    }
    .section-title {
      color: #b4d4ff;
      font-size: 1.3rem;
      font-weight: 300;
      letter-spacing: 1px;
      margin-bottom: 16px;
      border-left: 4px solid #3f8eff;
      padding-left: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-title button {
      background: rgba(30, 60, 120, 0.4);
      border: 1px solid #3f7fcf55;
      color: #b0d0ff;
      border-radius: 40px;
      padding: 6px 18px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.1s;
    }
    .section-title button:active {
      transform: scale(0.92);
      background: rgba(30, 60, 120, 0.7);
    }

    /* gallery grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .gallery-grid img, .gallery-grid video {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 20px;
      background: #121a26;
      border: 1px solid #2a4a6a;
      box-shadow: 0 4px 12px #00000066;
      cursor: pointer;
    }
    .upload-btn {
      background: #1e3450;
      border: none;
      padding: 12px;
      border-radius: 60px;
      color: #b2daff;
      font-size: 1rem;
      margin: 12px 0;
      box-shadow: 0 0 20px #1f6eff33;
      cursor: pointer;
    }
    .upload-btn:active {
      transform: scale(0.95);
    }
    .file-input-hidden { display: none; }
    .fullscreen-overlay {
      position: fixed;
      top:0;left:0;width:100%;height:100%;
      background: #05080f;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }
    .fullscreen-overlay img, .fullscreen-overlay video {
      max-width: 95%;
      max-height: 80%;
      border-radius: 24px;
      box-shadow: 0 0 80px #1f6eff55;
    }
    .fullscreen-close {
      position: absolute;
      top: 30px; right: 30px;
      background: #2f3f5f;
      border: none;
      color: white;
      font-size: 2rem;
      padding: 10px 16px;
      border-radius: 60px;
      cursor: pointer;
    }

    /* browser & youtube iframe */
    .browser-iframe, .youtube-iframe {
      width: 100%;
      height: 480px;
      border-radius: 30px;
      border: 1px solid #2a4a7a;
      background: #0b111a;
    }
    .url-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .url-bar input {
      flex:1;
      background: #111d2b;
      border: 1px solid #2a4a7a;
      border-radius: 40px;
      padding: 12px 18px;
      color: #cde0ff;
      font-size: 0.9rem;
    }
    .url-bar button {
      background: #1f4a7a;
      border: none;
      border-radius: 40px;
      padding: 0 22px;
      color: white;
      font-weight: 400;
      box-shadow: 0 0 20px #1f6eff33;
      cursor: pointer;
    }
    .url-bar button:active {
      transform: scale(0.92);
    }

    /* PIN Reset */
    #pinReset {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 30px 0;
    }
    #pinReset h3 {
      color: #b0d0ff;
      margin-bottom: 20px;
    }
    .reset-pin-box {
      background: rgba(0, 20, 40, 0.5);
      backdrop-filter: blur(16px);
      border-radius: 70px;
      padding: 18px 36px;
      font-size: 2.8rem;
      letter-spacing: 18px;
      color: #b0e0ff;
      border: 1px solid #3f8eff55;
      width: 230px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 0 40px #1f6eff33;
    }
    .reset-pin-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      width: 250px;
    }
    .reset-pin-pad button {
      aspect-ratio: 1/1;
      border-radius: 60px;
      border: none;
      background: #1b2636;
      color: #d6f0ff;
      font-size: 2rem;
      box-shadow: 0 6px 10px #00000077;
      transition: 0.07s;
      cursor: pointer;
    }
    .reset-pin-pad button:active {
      transform: scale(0.88);
      box-shadow: 0 0 30px #3d8eff;
    }
    #resetCancelBtn {
      background: transparent;
      border: 1px solid #4a6a8a;
      color: #8ab0d0;
      border-radius: 40px;
      padding: 10px 30px;
      margin-top: 20px;
      cursor: pointer;
      transition: 0.1s;
    }
    #resetCancelBtn:active {
      transform: scale(0.92);
      background: rgba(255,255,255,0.05);
    }

    /* Gallery Home Page */
    #galleryHomePage {
      display: none;
      flex-direction: column;
      padding: 6px 0 12px;
    }
    .gallery-home-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
      background: rgba(0,0,0,0.2);
      border-radius: 60px;
      padding: 24px 10px 18px;
      backdrop-filter: blur(6px);
      border: 1px solid #3f8eff33;
      position: relative;
    }
    .gallery-home-header .back-btn {
      position: absolute;
      left: 12px;
      top: 12px;
      background: rgba(30, 60, 120, 0.35);
      border: 1px solid #3f7fcf44;
      color: #b0d0ff;
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.1s;
      display: flex;
      align-items: center;
      gap: 4px;
      letter-spacing: 0.3px;
    }
    .gallery-home-header .back-btn i {
      font-size: 0.7rem;
      margin: 0;
      text-shadow: none;
      color: #b0d0ff;
    }
    .gallery-home-header .back-btn:active {
      transform: scale(0.90);
      background: rgba(30, 60, 120, 0.6);
    }
    .gallery-home-header i {
      font-size: 3.6rem;
      color: #80bfff;
      text-shadow: 0 0 40px #3f8eff;
      margin-bottom: 6px;
    }
    .gallery-home-header h3 {
      font-size: 2rem;
      font-weight: 400;
      background: linear-gradient(135deg, #b0d6ff, #b484ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    .gallery-home-header span {
      color: #859bb5;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }

    .gallery-home-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin: 10px 0 18px;
    }
    .gallery-home-item {
      background: rgba(30, 45, 70, 0.3);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 18px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid rgba(80, 180, 255, 0.15);
      box-shadow: 0 12px 24px rgba(0,0,0,0.6);
      transition: 0.15s;
      cursor: pointer;
      color: #cedfff;
    }
    .gallery-home-item:active {
      transform: scale(0.94);
      box-shadow: 0 0 40px #2f7eff55;
    }
    .gallery-home-item i {
      font-size: 2.4rem;
      margin-bottom: 6px;
      color: #90caff;
    }
    .gallery-home-item span {
      font-size: 0.75rem;
      letter-spacing: 0.5px;
      opacity: 0.9;
    }

    /* responsive */
    @media (max-width: 420px) {
      .phone { padding: 12px 10px; border-radius: 36px; }
      .calc-grid { gap: 10px; }
      .vault-cards { gap: 12px; }
      .gallery-home-grid { gap: 12px; }
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="phone" id="appContainer">
  <!-- PIN SETUP -->
  <div id="pinSetup">
    <h2><i class="fas fa-lock" style="margin-right: 8px;"></i> Set PIN</h2>
    <div class="pin-display" id="pinDisplay">····</div>
    <div class="pin-pad" id="pinPad">
      <button data-value="1">1</button><button data-value="2">2</button><button data-value="3">3</button>
      <button data-value="4">4</button><button data-value="5">5</button><button data-value="6">6</button>
      <button data-value="7">7</button><button data-value="8">8</button><button data-value="9">9</button>
      <button data-value="clear"><i class="fas fa-delete-left"></i></button>
      <button data-value="0">0</button>
      <button class="confirm-pin" id="confirmPin"><i class="fas fa-check"></i></button>
    </div>
    <p style="color:#6688aa;font-size:0.8rem;margin-top:12px;">enter 4 digits</p>
  </div>

  <!-- CALCULATOR -->
  <div id="calculator" style="display:none;">
    <div class="calc-display" id="calcDisplay">0</div>
    <div class="calc-grid">
      <button class="clear" data-value="clear">C</button>
      <button class="op" data-value="%">%</button>
      <button class="op" data-value="/">÷</button>
      <button class="op" data-value="*">×</button>
      <button data-value="7">7</button><button data-value="8">8</button><button data-value="9">9</button>
      <button class="op" data-value="-">−</button>
      <button data-value="4">4</button><button data-value="5">5</button><button data-value="6">6</button>
      <button class="op" data-value="+">+</button>
      <button data-value="1">1</button><button data-value="2">2</button><button data-value="3">3</button>
      <button class="eq" data-value="=">=</button>
      <button data-value="0">0</button>
      <button data-value=".">.</button>
      <button class="op" data-value="±">±</button>
      <button class="eq" data-value="unlock" style="background: #3a5a9a; font-size: 1.2rem;"><i class="fas fa-key"></i></button>
    </div>
  </div>

  <!-- VAULT UNLOCK -->
  <div id="vaultUnlock">
    <h3 style="color:#b0d0ff;margin-bottom:12px;">enter PIN</h3>
    <div class="vault-pin-box" id="vaultPinDisplay">····</div>
    <div class="vault-pin-pad" id="vaultPinPad">
      <button data-value="1">1</button><button data-value="2">2</button><button data-value="3">3</button>
      <button data-value="4">4</button><button data-value="5">5</button><button data-value="6">6</button>
      <button data-value="7">7</button><button data-value="8">8</button><button data-value="9">9</button>
      <button data-value="clear"><i class="fas fa-delete-left"></i></button>
      <button data-value="0">0</button>
      <button data-value="confirm" style="background:#4a6aff;color:white;" id="vaultConfirmBtn"><i class="fas fa-check"></i></button>
    </div>
  </div>

  <!-- PIN RESET -->
  <div id="pinReset">
    <h3 style="color:#b0d0ff;margin-bottom:8px;">Reset PIN</h3>
    <p style="color:#7799bb;font-size:0.8rem;margin-bottom:16px;">enter old PIN then new PIN</p>
    <div class="reset-pin-box" id="resetPinDisplay">····</div>
    <div class="reset-pin-pad" id="resetPinPad">
      <button data-value="1">1</button><button data-value="2">2</button><button data-value="3">3</button>
      <button data-value="4">4</button><button data-value="5">5</button><button data-value="6">6</button>
      <button data-value="7">7</button><button data-value="8">8</button><button data-value="9">9</button>
      <button data-value="clear"><i class="fas fa-delete-left"></i></button>
      <button data-value="0">0</button>
      <button data-value="confirm" style="background:#4a6aff;color:white;" id="resetConfirmBtn"><i class="fas fa-check"></i></button>
    </div>
    <button id="resetCancelBtn"><i class="fas fa-times"></i> Cancel</button>
  </div>

  <!-- GALLERY HOME PAGE -->
  <div id="galleryHomePage">
    <div class="gallery-home-header">
      <button class="back-btn" id="galleryHomeBackBtn"><i class="fas fa-arrow-left"></i> Back</button>
      <i class="fas fa-images"></i>
      <h3>Gallery Home</h3>
      <span>manage your private photos</span>
    </div>
    <div class="gallery-home-grid">
      <div class="gallery-home-item" data-section="gallery"><i class="fas fa-images"></i><span>All Photos</span></div>
      <div class="gallery-home-item" data-section="videos"><i class="fas fa-video"></i><span>Videos</span></div>
      <div class="gallery-home-item" data-section="favorites"><i class="fas fa-star"></i><span>Favorites</span></div>
    </div>
    <div id="galleryHomeSectionContainer"></div>
  </div>

  <!-- VAULT HOME -->
  <div id="vaultHome">
    <div class="vault-header">
      <button class="back-btn" id="vaultHomeBackBtn"><i class="fas fa-arrow-left"></i> Back</button>
      <i class="fas fa-lock"></i>
      <h3>Private Vault</h3>
      <span>secure local storage</span>
    </div>
    <div class="vault-cards">
      <div class="vault-card" data-section="galleryhome"><i class="fas fa-images"></i><span>Gallery</span></div>
      <div class="vault-card" data-section="videos"><i class="fas fa-video"></i><span>Videos</span></div>
      <div class="vault-card" data-section="browser"><i class="fas fa-globe"></i><span>Browser</span></div>
      <div class="vault-card" data-section="youtube"><i class="fab fa-youtube"></i><span>YouTube</span></div>
      <div class="vault-card" data-section="games"><i class="fas fa-gamepad"></i><span>Games</span></div>
    </div>
    <div id="vaultSectionContainer"></div>
    <div class="bottom-nav" id="bottomNav">
      <button class="active" data-section="home"><i class="fas fa-home"></i></button>
      <button data-section="galleryhome"><i class="fas fa-images"></i></button>
      <button data-section="videos"><i class="fas fa-video"></i></button>
      <button data-section="browser"><i class="fas fa-globe"></i></button>
      <button data-section="youtube"><i class="fab fa-youtube"></i></button>
      <button data-section="games"><i class="fas fa-gamepad"></i></button>
    </div>
  </div>
</div>
<script>
  (function(){
    // STATE
    let storedPin = localStorage.getItem('vaultPin') || null;
    let currentPin = '';
    let vaultUnlocked = false;
    let calculatorValue = '0';
    let calcExpression = '';
    let calcResult = null;
    let lastOperator = null;
    let shouldResetDisplay = false;

    // DOM refs
    const pinSetup = document.getElementById('pinSetup');
    const calculator = document.getElementById('calculator');
    const vaultUnlockEl = document.getElementById('vaultUnlock');
    const vaultHome = document.getElementById('vaultHome');
    const bottomNav = document.getElementById('bottomNav');
    const pinDisplay = document.getElementById('pinDisplay');
    const vaultPinDisplay = document.getElementById('vaultPinDisplay');
    const calcDisplay = document.getElementById('calcDisplay');
    const sectionContainer = document.getElementById('vaultSectionContainer');
    const pinReset = document.getElementById('pinReset');
    const resetPinDisplay = document.getElementById('resetPinDisplay');
    const galleryHomePage = document.getElementById('galleryHomePage');
    const galleryHomeSectionContainer = document.getElementById('galleryHomeSectionContainer');

    // PIN setup
    function updatePinDisplay() {
      const dots = currentPin.padEnd(4, '·').slice(0,4);
      pinDisplay.textContent = dots;
    }
    document.querySelectorAll('#pinPad button').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const val = this.dataset.value;
        if (val === 'clear') { currentPin = currentPin.slice(0,-1); updatePinDisplay(); return; }
        if (currentPin.length < 4) currentPin += val;
        updatePinDisplay();
      });
    });
    document.getElementById('confirmPin').addEventListener('click', function() {
      if (currentPin.length === 4) {
        storedPin = currentPin;
        localStorage.setItem('vaultPin', storedPin);
        pinSetup.style.display = 'none';
        calculator.style.display = 'flex';
        vaultUnlockEl.style.display = 'none';
        vaultHome.style.display = 'none';
        bottomNav.style.display = 'none';
        pinReset.style.display = 'none';
        galleryHomePage.style.display = 'none';
        currentPin = '';
        updatePinDisplay();
        resetCalculator();
      } else {
        alert('enter 4 digits');
      }
    });

    // Calculator
    function resetCalculator() {
      calcExpression = '';
      calcResult = null;
      lastOperator = null;
      calculatorValue = '0';
      calcDisplay.textContent = '0';
    }
    function updateCalcDisplay() {
      calcDisplay.textContent = calculatorValue;
    }
    document.querySelectorAll('.calc-grid button').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const val = this.dataset.value;
        if (val === 'unlock') {
          if (!storedPin) return;
          vaultUnlockEl.style.display = 'flex';
          calculator.style.display = 'none';
          vaultPinDisplay.textContent = '····';
          return;
        }
        if (val === 'clear') { resetCalculator(); return; }
        if (val === '=') {
          if (calcExpression) {
            try {
              const result = Function('"use strict"; return (' + calcExpression + ')')();
              calculatorValue = String(result);
              calcExpression = String(result);
              calcResult = result;
              updateCalcDisplay();
              shouldResetDisplay = true;
              lastOperator = null;
            } catch(e) { /* ignore */ }
          }
          return;
        }
        if (['+','-','*','/','%'].includes(val)) {
          if (calcExpression === '' && calculatorValue !== '0') {
            calcExpression = calculatorValue + val;
          } else if (calcExpression !== '') {
            if (!isNaN(parseFloat(calculatorValue))) {
              try {
                const result = Function('"use strict"; return (' + calcExpression + ')')();
                calcExpression = String(result) + val;
                calculatorValue = String(result);
                updateCalcDisplay();
              } catch(e) { calcExpression = calculatorValue + val; }
            } else {
              calcExpression = calcExpression.slice(0,-1) + val;
            }
          } else {
            calcExpression = '0' + val;
          }
          shouldResetDisplay = true;
          return;
        }
        if (val === '±') {
          if (calculatorValue !== '0') {
            if (calculatorValue.startsWith('-')) calculatorValue = calculatorValue.slice(1);
            else calculatorValue = '-' + calculatorValue;
            updateCalcDisplay();
          }
          return;
        }
        if (val === '.') {
          if (!calculatorValue.includes('.')) calculatorValue += '.';
          updateCalcDisplay();
          return;
        }
        // numbers
        if (shouldResetDisplay || calculatorValue === '0') {
          calculatorValue = val;
          shouldResetDisplay = false;
        } else {
          calculatorValue += val;
        }
        updateCalcDisplay();
        if (calcExpression !== '' && !calcExpression.endsWith('.')) {
          const lastChar = calcExpression.slice(-1);
          if ('+-*/%'.includes(lastChar)) {
            calcExpression = calcExpression + val;
          } else {
            const parts = calcExpression.split(/[\+\-\*\/]/);
            if (parts.length>1) {
              const lastPart = parts.pop();
              calcExpression = parts.join('') + lastChar + val;
            } else {
              calcExpression = val;
            }
          }
        } else {
          if (calcExpression === '') calcExpression = val;
          else if ('+-*/%'.includes(calcExpression.slice(-1))) calcExpression += val;
          else calcExpression = val;
        }
      });
    });

    // Vault unlock
    let vaultPin = '';
    function updateVaultDisplay() {
      const dots = vaultPin.padEnd(4, '·').slice(0,4);
      vaultPinDisplay.textContent = dots;
    }
    document.querySelectorAll('#vaultPinPad button').forEach(btn => {
      btn.addEventListener('click', function() {
        const val = this.dataset.value;
        if (val === 'clear') { vaultPin = vaultPin.slice(0,-1); updateVaultDisplay(); return; }
        if (val === 'confirm') {
          if (vaultPin === storedPin) {
            vaultUnlocked = true;
            vaultUnlockEl.style.display = 'none';
            vaultHome.style.display = 'flex';
            bottomNav.style.display = 'flex';
            calculator.style.display = 'none';
            pinSetup.style.display = 'none';
            pinReset.style.display = 'none';
            galleryHomePage.style.display = 'none';
            renderSection('home');
            vaultPin = '';
            updateVaultDisplay();
          } else {
            alert('wrong PIN');
            vaultPin = '';
            updateVaultDisplay();
          }
          return;
        }
        if (vaultPin.length < 4) vaultPin += val;
        updateVaultDisplay();
      });
    });

    // PIN Reset
    let resetStep = 'old'; // 'old' or 'new'
    let oldPin = '';
    let newPin = '';
    function updateResetDisplay() {
      const display = resetStep === 'old' ? oldPin : newPin;
      const dots = display.padEnd(4, '·').slice(0,4);
      resetPinDisplay.textContent = dots;
    }
    document.querySelectorAll('#resetPinPad button').forEach(btn => {
      btn.addEventListener('click', function() {
        const val = this.dataset.value;
        if (val === 'clear') {
          if (resetStep === 'old') { oldPin = oldPin.slice(0,-1); updateResetDisplay(); }
          else { newPin = newPin.slice(0,-1); updateResetDisplay(); }
          return;
        }
        if (val === 'confirm') {
          if (resetStep === 'old') {
            if (oldPin === storedPin) {
              resetStep = 'new';
              newPin = '';
              updateResetDisplay();
              document.querySelector('#pinReset h3').textContent = 'Enter NEW PIN';
              document.querySelector('#pinReset p').textContent = 'enter 4-digit new PIN';
            } else {
              alert('Old PIN incorrect');
              oldPin = '';
              updateResetDisplay();
            }
          } else {
            if (newPin.length === 4) {
              storedPin = newPin;
              localStorage.setItem('vaultPin', storedPin);
              alert('PIN reset successful!');
              resetStep = 'old';
              oldPin = '';
              newPin = '';
              document.querySelector('#pinReset h3').textContent = 'Reset PIN';
              document.querySelector('#pinReset p').textContent = 'enter old PIN then new PIN';
              pinReset.style.display = 'none';
              vaultHome.style.display = 'flex';
              bottomNav.style.display = 'flex';
              renderSection('home');
              updateResetDisplay();
            } else {
              alert('Enter 4-digit new PIN');
            }
          }
          return;
        }
        if (resetStep === 'old') {
          if (oldPin.length < 4) oldPin += val;
        } else {
          if (newPin.length < 4) newPin += val;
        }
        updateResetDisplay();
      });
    });
    document.getElementById('resetCancelBtn').addEventListener('click', function() {
      pinReset.style.display = 'none';
      vaultHome.style.display = 'flex';
      bottomNav.style.display = 'flex';
      resetStep = 'old';
      oldPin = '';
      newPin = '';
      document.querySelector('#pinReset h3').textContent = 'Reset PIN';
      document.querySelector('#pinReset p').textContent = 'enter old PIN then new PIN';
      renderSection('home');
    });

    // Navigation - with back functionality
    let sectionHistory = ['home'];
    function renderSection(section) {
      // If going to a new section, push to history
      if (section !== sectionHistory[sectionHistory.length - 1]) {
        sectionHistory.push(section);
      }
      sectionContainer.innerHTML = '';
      galleryHomePage.style.display = 'none';
      if (section === 'home') {
        const homeHtml = `
          <div style="color:#b0d0ff;padding:12px;text-align:center;background:rgba(0,0,0,0.2);border-radius:40px;backdrop-filter:blur(6px);border:1px solid #2f6faf33;">
            <i class="fas fa-shield-alt" style="font-size:3rem;color:#7abfff;"></i>
            <p style="margin-top:10px;">secure private storage</p>
            <button id="resetPinBtn" style="background:#2a4a7a;border:none;border-radius:40px;padding:10px 24px;color:white;margin-top:16px;box-shadow:0 0 20px #1f6eff33;cursor:pointer;transition:0.1s;"><i class="fas fa-key"></i> Reset PIN</button>
          </div>
        `;
        sectionContainer.innerHTML = homeHtml;
        document.getElementById('resetPinBtn').addEventListener('click', function() {
          vaultHome.style.display = 'none';
          bottomNav.style.display = 'none';
          pinReset.style.display = 'flex';
          resetStep = 'old';
          oldPin = '';
          newPin = '';
          document.querySelector('#pinReset h3').textContent = 'Enter OLD PIN';
          document.querySelector('#pinReset p').textContent = 'enter your current PIN';
          updateResetDisplay();
        });
        document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
        document.querySelector('.bottom-nav button[data-section="home"]')?.classList.add('active');
        sectionHistory = ['home'];
        return;
      }
      if (section === 'galleryhome') {
        renderGalleryHome();
        return;
      }
      if (section === 'gallery') {
        renderGallery();
        return;
      }
      if (section === 'videos') {
        renderVideos();
        return;
      }
      if (section === 'browser') {
        renderBrowser();
        return;
      }
      if (section === 'youtube') {
        renderYoutube();
        return;
      }
      if (section === 'games') {
        renderGames();
        return;
      }
    }

    // Back function - goes to calculator
    function goBackToCalculator() {
      vaultHome.style.display = 'none';
      bottomNav.style.display = 'none';
      calculator.style.display = 'flex';
      vaultUnlockEl.style.display = 'none';
      pinReset.style.display = 'none';
      pinSetup.style.display = 'none';
      galleryHomePage.style.display = 'none';
      resetCalculator();
      sectionHistory = ['home'];
    }

    // Back function - goes to previous section within vault
    function goBack() {
      if (sectionHistory.length > 1) {
        sectionHistory.pop();
        const prevSection = sectionHistory[sectionHistory.length - 1];
        renderSection(prevSection);
        // Update bottom nav active state
        document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
        const navBtn = document.querySelector(`.bottom-nav button[data-section="${prevSection}"]`);
        if (navBtn) navBtn.classList.add('active');
      } else {
        // If only home in history, go to home
        renderSection('home');
        document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
        document.querySelector('.bottom-nav button[data-section="home"]')?.classList.add('active');
      }
    }

    // Gallery Home Page
    function renderGalleryHome() {
      galleryHomePage.style.display = 'flex';
      sectionContainer.innerHTML = '';
      galleryHomeSectionContainer.innerHTML = '';
      document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
      const navBtn = document.querySelector('.bottom-nav button[data-section="galleryhome"]');
      if (navBtn) navBtn.classList.add('active');
    }

    // Gallery Home Back
    document.getElementById('galleryHomeBackBtn').addEventListener('click', function() {
      galleryHomePage.style.display = 'none';
      renderSection('home');
      document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
      document.querySelector('.bottom-nav button[data-section="home"]')?.classList.add('active');
    });

    // Gallery Home Items
    document.querySelectorAll('.gallery-home-item').forEach(item => {
      item.addEventListener('click', function() {
        const section = this.dataset.section;
        galleryHomePage.style.display = 'none';
        renderSection(section);
        document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
        const navBtn = document.querySelector(`.bottom-nav button[data-section="${section}"]`);
        if (navBtn) navBtn.classList.add('active');
      });
    });

    // Vault Home Back button - goes to calculator
    document.getElementById('vaultHomeBackBtn').addEventListener('click', goBackToCalculator);

    document.querySelectorAll('.bottom-nav button').forEach(btn => {
      btn.addEventListener('click', function() {
        const section = this.dataset.section;
        renderSection(section);
        document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
      });
    });
    document.querySelectorAll('.vault-card').forEach(card => {
      card.addEventListener('click', function() {
        const section = this.dataset.section;
        renderSection(section);
        document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
        const navBtn = document.querySelector(`.bottom-nav button[data-section="${section}"]`);
        if (navBtn) navBtn.classList.add('active');
      });
    });

    // IndexedDB
    let db = null;
    function openDB() {
      return new Promise((resolve) => {
        const req = indexedDB.open('VaultDB', 1);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('media')) {
            db.createObjectStore('media', { keyPath: 'id', autoIncrement: true });
          }
        };
        req.onsuccess = (e) => { db = e.target.result; resolve(db); };
        req.onerror = () => resolve(null);
      });
    }
    async function saveMedia(file, type) {
      const reader = new FileReader();
      return new Promise((resolve) => {
        reader.onload = async (e) => {
          const data = e.target.result;
          if (!db) await openDB();
          const tx = db.transaction('media', 'readwrite');
          const store = tx.objectStore('media');
          store.add({ data, type, name: file.name, mime: file.type });
          tx.oncomplete = () => resolve(true);
          tx.onerror = () => resolve(false);
        };
        reader.readAsDataURL(file);
      });
    }
    function getAllMedia() {
      return new Promise((resolve) => {
        if (!db) { resolve([]); return; }
        const tx = db.transaction('media', 'readonly');
        const store = tx.objectStore('media');
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => resolve([]);
      });
    }
    function deleteMedia(id) {
      return new Promise((resolve) => {
        if (!db) { resolve(false); return; }
        const tx = db.transaction('media', 'readwrite');
        const store = tx.objectStore('media');
        store.delete(id);
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => resolve(false);
      });
    }

    // Gallery with back button
    async function renderGallery() {
      const media = await getAllMedia();
      const images = media.filter(m => m.type.startsWith('image'));
      let html = `<div class="section-title">
        <span><i class="fas fa-images"></i> All Photos</span>
        <button id="galleryBackBtn"><i class="fas fa-arrow-left"></i> Back</button>
      </div>
        <input type="file" accept="image/*" id="galleryInput" class="file-input-hidden" multiple>
        <button class="upload-btn" id="galleryUploadBtn"><i class="fas fa-plus"></i> Import photos</button>
        <div class="gallery-grid" id="galleryGrid">`;
      images.forEach(img => {
        html += `<div data-id="${img.id}" class="gallery-item"><img src="${img.data}" alt="${img.name}" /></div>`;
      });
      html += `</div>`;
      sectionContainer.innerHTML = html;
      document.getElementById('galleryBackBtn').addEventListener('click', goBack);
      document.getElementById('galleryUploadBtn').addEventListener('click', ()=> document.getElementById('galleryInput').click());
      document.getElementById('galleryInput').addEventListener('change', async function(e) {
        for (let f of this.files) {
          await saveMedia(f, 'image');
        }
        renderGallery();
      });
      document.querySelectorAll('.gallery-item').forEach(el => {
        el.addEventListener('click', function() {
          const id = Number(this.dataset.id);
          const img = this.querySelector('img');
          if (img) showFullscreen(img.src, 'image');
        });
        el.addEventListener('contextmenu', async function(e) {
          e.preventDefault();
          const id = Number(this.dataset.id);
          if (confirm('delete this image?')) {
            await deleteMedia(id);
            renderGallery();
          }
        });
      });
      document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
      const navBtn = document.querySelector('.bottom-nav button[data-section="gallery"]');
      if (navBtn) navBtn.classList.add('active');
    }

    // Videos with back button
    async function renderVideos() {
      const media = await getAllMedia();
      const videos = media.filter(m => m.type.startsWith('video'));
      let html = `<div class="section-title">
        <span><i class="fas fa-video"></i> Private Videos</span>
        <button id="videosBackBtn"><i class="fas fa-arrow-left"></i> Back</button>
      </div>
        <input type="file" accept="video/*" id="videoInput" class="file-input-hidden" multiple>
        <button class="upload-btn" id="videoUploadBtn"><i class="fas fa-plus"></i> Import videos</button>
        <div class="gallery-grid" id="videoGrid">`;
      videos.forEach(v => {
        html += `<div data-id="${v.id}" class="video-item"><video src="${v.data}" muted></video></div>`;
      });
      html += `</div>`;
      sectionContainer.innerHTML = html;
      document.getElementById('videosBackBtn').addEventListener('click', goBack);
      document.getElementById('videoUploadBtn').addEventListener('click', ()=> document.getElementById('videoInput').click());
      document.getElementById('videoInput').addEventListener('change', async function(e) {
        for (let f of this.files) {
          await saveMedia(f, 'video');
        }
        renderVideos();
      });
      document.querySelectorAll('.video-item').forEach(el => {
        el.addEventListener('click', function() {
          const video = this.querySelector('video');
          if (video) {
            const src = video.src;
            showFullscreen(src, 'video');
          }
        });
        el.addEventListener('contextmenu', async function(e) {
          e.preventDefault();
          const id = Number(this.dataset.id);
          if (confirm('delete this video?')) {
            await deleteMedia(id);
            renderVideos();
          }
        });
      });
      document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
      const navBtn = document.querySelector('.bottom-nav button[data-section="videos"]');
      if (navBtn) navBtn.classList.add('active');
    }

    function showFullscreen(src, type) {
      const overlay = document.createElement('div');
      overlay.className = 'fullscreen-overlay';
      overlay.innerHTML = `<button class="fullscreen-close"><i class="fas fa-times"></i></button>`;
      const media = type === 'image' ? document.createElement('img') : document.createElement('video');
      media.src = src;
      if (type === 'video') media.controls = true;
      overlay.appendChild(media);
      document.body.appendChild(overlay);
      overlay.querySelector('.fullscreen-close').addEventListener('click', ()=> overlay.remove());
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    }

    // Browser
    function renderBrowser() {
      const html = `
        <div class="section-title">
          <span><i class="fas fa-globe"></i> Private Browser</span>
          <button id="browserBackBtn"><i class="fas fa-arrow-left"></i> Back</button>
        </div>
        <div class="url-bar">
          <input id="browserUrl" placeholder="https://duckduckgo.com" value="https://duckduckgo.com">
          <button id="browserGo"><i class="fas fa-arrow-right"></i></button>
        </div>
        <iframe id="browserIframe" class="browser-iframe" src="https://duckduckgo.com" allow="fullscreen"></iframe>
      `;
      sectionContainer.innerHTML = html;
      document.getElementById('browserBackBtn').addEventListener('click', goBack);
      document.getElementById('browserGo').addEventListener('click', function() {
        const url = document.getElementById('browserUrl').value.trim();
        if (url) {
          let final = url;
          if (!url.startsWith('http://') && !url.startsWith('https://')) final = 'https://' + url;
          document.getElementById('browserIframe').src = final;
        }
      });
      document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
      const navBtn = document.querySelector('.bottom-nav button[data-section="browser"]');
      if (navBtn) navBtn.classList.add('active');
    }

    // YouTube
    function renderYoutube() {
      const html = `
        <div class="section-title">
          <span><i class="fab fa-youtube"></i> YouTube</span>
          <button id="youtubeBackBtn"><i class="fas fa-arrow-left"></i> Back</button>
        </div>
        <div class="url-bar">
          <input id="youtubeSearch" placeholder="search videos" value="lofi">
          <button id="youtubeGo"><i class="fas fa-search"></i></button>
        </div>
        <iframe id="youtubeIframe" class="youtube-iframe" src="https://www.youtube.com/embed?listType=search&list=lofi" allow="fullscreen"></iframe>
      `;
      sectionContainer.innerHTML = html;
      document.getElementById('youtubeBackBtn').addEventListener('click', goBack);
      document.getElementById('youtubeGo').addEventListener('click', function() {
        const query = document.getElementById('youtubeSearch').value.trim();
        if (query) {
          document.getElementById('youtubeIframe').src = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(query)}`;
        }
      });
      document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
      const navBtn = document.querySelector('.bottom-nav button[data-section="youtube"]');
      if (navBtn) navBtn.classList.add('active');
    }

    // Games
    function renderGames() {
      const games = [
        { name: 'Yeti Sensation', url: 'https://gemioli.com/yetisensation/html5/gemioli/' },
        { name: 'Slinguin', url: 'https://gemioli.com/slinguin/html5/gemioli/' },
        { name: 'The Saloon', url: 'https://gemioli.com/thesaloon/html5/gemioli/' },
        { name: 'Pirate Ship', url: 'https://gemioli.com/thepirateship/' }
      ];
      let html = `<div class="section-title">
        <span><i class="fas fa-gamepad"></i> Games Library</span>
        <button id="gamesBackBtn"><i class="fas fa-arrow-left"></i> Back</button>
      </div><div style="display:grid;gap:16px;">`;
      games.forEach(g => {
        html += `<div style="background:rgba(20,30,50,0.5);border-radius:30px;padding:14px;border:1px solid #3f6faf33;backdrop-filter:blur(6px);display:flex;justify-content:space-between;align-items:center;">
          <span style="color:#b8d6ff;">${g.name}</span>
          <button data-url="${g.url}" class="game-play-btn" style="background:#2f5a8a;border:none;border-radius:40px;padding:10px 22px;color:white;box-shadow:0 0 20px #1f6eff33;cursor:pointer;transition:0.1s;"><i class="fas fa-play"></i></button>
        </div>`;
      });
      html += `</div><div id="gameFrameContainer" style="margin-top:16px;border-radius:30px;overflow:hidden;border:1px solid #2f5a8a;height:480px;"></div>`;
      sectionContainer.innerHTML = html;
      document.getElementById('gamesBackBtn').addEventListener('click', goBack);
      document.querySelectorAll('.game-play-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const url = this.dataset.url;
          const container = document.getElementById('gameFrameContainer');
          container.innerHTML = `<iframe src="${url}" style="width:100%;height:100%;border:none;background:#0a0f18;"></iframe>`;
        });
        btn.addEventListener('touchstart', function() {
          this.style.transform = 'scale(0.92)';
        });
        btn.addEventListener('touchend', function() {
          this.style.transform = 'scale(1)';
        });
      });
      document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
      const navBtn = document.querySelector('.bottom-nav button[data-section="games"]');
      if (navBtn) navBtn.classList.add('active');
    }

    // init
    (async function init() {
      await openDB();
      if (storedPin) {
        pinSetup.style.display = 'none';
        calculator.style.display = 'flex';
        vaultUnlockEl.style.display = 'none';
        vaultHome.style.display = 'none';
        bottomNav.style.display = 'none';
        pinReset.style.display = 'none';
        galleryHomePage.style.display = 'none';
        resetCalculator();
      } else {
        pinSetup.style.display = 'flex';
        calculator.style.display = 'none';
        vaultUnlockEl.style.display = 'none';
        vaultHome.style.display = 'none';
        bottomNav.style.display = 'none';
        pinReset.style.display = 'none';
        galleryHomePage.style.display = 'none';
      }
    })();
  })();
</script>
</body>
</html>
